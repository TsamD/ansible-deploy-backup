- name: Install required packages
  hosts: all
  become: True
  tasks:
    - name: apt packages
      apt:
        pkg:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - python3-pip
          - git
          - virtualenv
          - python3-setuptools
          - tree
        update_cache: yes
        state: latest
